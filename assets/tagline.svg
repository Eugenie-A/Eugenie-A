<svg width="500" height="44" viewBox="0 0 500 44" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .p1 { animation: slide 9s cubic-bezier(0.4, 0, 0.2, 1) 0s infinite; }
      .p2 { animation: slide 9s cubic-bezier(0.4, 0, 0.2, 1) 3s infinite; }
      .p3 { animation: slide 9s cubic-bezier(0.4, 0, 0.2, 1) 6s infinite; }
      @keyframes slide {
        0%   { transform: translateY(44px); opacity: 0; }
        5%   { transform: translateY(0);    opacity: 1; }
        28%  { transform: translateY(0);    opacity: 1; }
        33%  { transform: translateY(-44px); opacity: 0; }
        100% { transform: translateY(-44px); opacity: 0; }
      }
    </style>
  </defs>
  <clipPath id="clip">
    <rect width="500" height="44"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <text class="p1" x="0" y="28" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#c9d1d9">Passionate Software Developer</text>
    <text class="p2" x="0" y="28" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#c9d1d9">Immersed in Anime &amp; Games</text>
    <text class="p3" x="0" y="28" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#c9d1d9">Music &amp; SFX Production</text>
  </g>
</svg>
